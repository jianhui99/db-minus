services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: dbminus
      POSTGRES_PASSWORD: dbminus
      POSTGRES_DB: dbminus_test
    ports:
      - "5433:5432"
    volumes:
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbminus -d dbminus_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dbminus
      MYSQL_PASSWORD: dbminus
      MYSQL_DATABASE: dbminus_test
    ports:
      - "3307:3306"
    volumes:
      - ./seed/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 2s
      timeout: 3s
      retries: 60
